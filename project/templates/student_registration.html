<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Student Registration Request | Face Detection System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body class="login-body">
    <div class="login-container p-4">
      <div class="card login-card">
        <div class="card-body">
          <h3 class="card-title text-center mb-3">Student Registration</h3>
          <p class="text-secondary text-center mb-4">Submit details for admin approval</p>

          {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
              <div class="flash-message">
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>
                {% endfor %}
              </div>
            {% endif %}
          {% endwith %}

          <form method="post" class="mt-3">
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" value="{{ user['username'] }}" disabled />
            </div>
            <div class="mb-3">
              <label for="full_name" class="form-label">Full Name</label>
              <input type="text" class="form-control" id="full_name" name="full_name" value="{{ user['full_name'] or '' }}" required />
            </div>
            <div class="mb-4">
              <label for="department" class="form-label">Department</label>
              <input type="text" class="form-control" id="department" name="department" value="{{ user['department'] or '' }}" required />
            </div>
            <button type="submit" class="btn btn-primary w-100">Submit for Approval</button>
          </form>

          <div class="text-center mt-4">
            <a href="{{ url_for('login') }}" class="text-primary fw-semibold">Back to Login</a>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
